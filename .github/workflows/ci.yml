name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      verify_runtime_alignment:
        description: "Verify Node/npm match package.json engines/packageManager"
        required: false
        default: "true"

jobs:
  install-and-validate:
    runs-on: ubuntu-latest
    env:
      # Set to "false" to skip runtime alignment checks.
      VERIFY_NODE_NPM_ALIGNMENT: ${{ github.event.inputs.verify_runtime_alignment || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js from package.json engines.node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Ensure package-lock.json is updated when package.json changes
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"

          if echo "$changed_files" | grep -qx "package.json"; then
            if ! echo "$changed_files" | grep -qx "package-lock.json"; then
              echo "package.json changed without package-lock.json update."
              exit 1
            fi
          fi

      - name: Verify Node/npm versions align with package.json (optional)
        if: env.VERIFY_NODE_NPM_ALIGNMENT == 'true'
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const cp = require('child_process');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const nodeVersion = process.versions.node;
          const npmVersion = cp.execSync('npm --version', { encoding: 'utf8' }).trim();

          const major = (v) => Number(String(v).replace(/^v/, '').split('.')[0]);
          const expectedNodeMajor = major(pkg.engines?.node || '');
          const expectedNpmMajorFromEngines = major(pkg.engines?.npm || '');
          const expectedNpmMajorFromPm = major((pkg.packageManager || '').split('@')[1] || '');

          if (!Number.isFinite(expectedNodeMajor)) {
            throw new Error('package.json engines.node is missing or unparseable');
          }

          if (major(nodeVersion) !== expectedNodeMajor) {
            throw new Error(`Node mismatch: expected major ${expectedNodeMajor} from engines.node, got ${nodeVersion}`);
          }

          if (Number.isFinite(expectedNpmMajorFromEngines) && major(npmVersion) !== expectedNpmMajorFromEngines) {
            throw new Error(`npm mismatch with engines.npm: expected major ${expectedNpmMajorFromEngines}, got ${npmVersion}`);
          }

          if (Number.isFinite(expectedNpmMajorFromPm) && major(npmVersion) !== expectedNpmMajorFromPm) {
            throw new Error(`npm mismatch with packageManager: expected major ${expectedNpmMajorFromPm}, got ${npmVersion}`);
          }

          console.log(`Runtime alignment OK (node ${nodeVersion}, npm ${npmVersion})`);
          NODE

      - name: Install dependencies
        run: npm ci
